<script>
let generatedCaptcha = "";

// ✅ Generate captcha (mix small, capital + 2 numbers)
function generateCaptcha() {
    let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
    let numbers = "0123456789";

    let captchaArray = [];

    // 4 random letters
    for (let i = 0; i < 4; i++) {
        captchaArray.push(letters[Math.floor(Math.random() * letters.length)]);
    }

    // 2 random numbers
    captchaArray.push(numbers[Math.floor(Math.random() * 10)]);
    captchaArray.push(numbers[Math.floor(Math.random() * 10)]);

    // shuffle positions
    captchaArray.sort(() => Math.random() - 0.5);

    generatedCaptcha = captchaArray.join("");

    document.getElementById("captchaBox").textContent = generatedCaptcha;
}

// 🔄 Refresh click
document.getElementById("captcha-refresh-btn").addEventListener("click", function() {
    generateCaptcha();
});

// 🚀 Validate on submit
document.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();

    let userInput = document.getElementById("Captcha1").value.trim();
    let errorSpan = document.getElementById("captchaError");

    if (userInput === generatedCaptcha) {
        errorSpan.textContent = "";
        window.location.href = "https://nta-neet.github.io/Download_scorecard_2026/";
    } else {
        errorSpan.textContent = "Invalid CAPTCHA";
        generateCaptcha(); // optional: regenerate on wrong
    }
});

// 🔥 Generate first captcha on load
window.onload = generateCaptcha;
</script>
